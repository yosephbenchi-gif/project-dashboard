name: Sync dashboard

on:
  push:
    paths:
      - '**/status.json'
      - '**/PROJECT_STATUS.md'
  schedule:
    - cron: '0 */4 * * *'  # also runs every 4 hours
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync script
        run: |
          python scripts/sync.py --dirs projects/

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard-data.json docs/dashboard-history.json
          git diff --staged --quiet || git commit -m "chore: auto-sync dashboard data [skip ci]"
          git push
